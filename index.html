<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuento de Ventas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Pantalla de inicio de sesión (visible hasta que entras) -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>🧾 Recuento de Ventas</h1>
      <p class="sub">Introduce tus datos para entrar</p>
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="username" placeholder="tu@email.com" />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="btn-primary" id="btnLogin">Entrar</button>
      </form>
    </div>
  </div>

  <header>
    <div class="container header-row" style="padding-top:0;padding-bottom:0;">
      <div class="brand">
        <img src="logo_web.png" alt="AgroBimi" class="logo" />
        <div>
          <h1>🧾 Recuento de Ventas</h1>
          <p>Registra y consulta las ventas de tu tienda</p>
        </div>
      </div>
      <button class="btn-ghost" id="btnLogout">Cerrar sesión</button>
    </div>
  </header>

  <main class="container">
    <!-- Barra de búsqueda -->
    <div class="toolbar">
      <div class="field">
        <label for="desde">Desde</label>
        <input type="date" id="desde" />
      </div>
      <div class="field">
        <label for="hasta">Hasta</label>
        <input type="date" id="hasta" />
      </div>
      <div class="field" style="flex:2 1 180px;">
        <label for="buscar">Buscar (producto o factura)</label>
        <input type="text" id="buscar" placeholder="Ej. camiseta, F-2024..." />
      </div>
      <button class="btn-ghost" id="btnLimpiar">Limpiar</button>
      <button class="btn-primary" id="btnAnadir">+ Añadir</button>
    </div>

    <!-- Resumen -->
    <div class="summary">
      <span class="total" id="total">Total: 0,00 €</span>
      <span class="count" id="count">0 ventas</span>
    </div>

    <!-- Lista de ventas -->
    <div class="card-list" id="lista"></div>
  </main>

  <!-- Modal Añadir/Editar -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2 id="modalTitulo">Añadir venta</h2>
      <form id="formVenta">
        <input type="hidden" id="ventaId" />
        <div class="field">
          <label for="fecha">Fecha de venta *</label>
          <input type="date" id="fecha" required />
        </div>
        <div class="field">
          <label for="producto">Producto *</label>
          <input type="text" id="producto" required placeholder="Nombre del producto" />
        </div>
        <div class="field">
          <label for="precio">Precio (€) *</label>
          <input type="number" id="precio" step="0.01" min="0" required placeholder="0,00" />
        </div>
        <div class="field">
          <label for="factura">Nº de factura</label>
          <input type="text" id="factura" placeholder="Opcional" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" id="btnCancelar">Cancelar</button>
          <button type="submit" class="btn-primary" id="btnGuardar">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Cliente de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
